<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
    font-family:'Segoe UI',sans-serif;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:flotar 3s ease-in-out infinite;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

p{
    font-size:1.2rem;
    line-height:1.6;
}

.corazon{
    position:absolute;
    color:white;
    animation:subir 8s linear infinite;
    opacity:0.7;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4f81;
    font-size:1rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100px);
        opacity:1;
    }
}

@keyframes flotar{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}
</style>
</head>
<body>

<div class="card">
    <h1>❤️ Marianny Mi Amor ❤️</h1>

    <p>
        Desde que llegaste a mi vida, cada día tiene un motivo especial.
        Tu sonrisa ilumina mis momentos difíciles y tu cariño hace que todo valga la pena.
    </p>

    <p>
        Gracias por ser tú. 🌹
        Eres una de las mejores cosas que me han pasado.
    </p>

    <button onclick="mensaje()">
        Presióname 💌
    </button>
</div>

<script>
function mensaje(){
    alert("Te amo muchísimo ❤️ Gracias por compartir tu vida conmigo.");
}

function crearCorazon(){
    const corazon=document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML="❤";
    corazon.style.left=Math.random()*100+"vw";
    corazon.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(corazon);

    setTimeout(()=>{
        corazon.remove();
    },8000);
}

setInterval(crearCorazon,300);
</script>

</body>
</html>
